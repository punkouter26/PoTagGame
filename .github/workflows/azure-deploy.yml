name: Build and Deploy PoTagGame

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC Azure login
  contents: read

env:
  DOTNET_VERSION:   '10.x'
  NODE_VERSION:     '20'
  AZURE_APP_NAME:   'PoTagGame-Server'
  SWA_APP_LOCATION: 'src/server/wwwroot'

jobs:
  # ── 1. Build React client ─────────────────────────────────────────────────
  build-client:
    name: Build React Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite SPA
        run: npm run build
        env:
          VITE_API_URL: 'https://potaggame-server.azurewebsites.net/tagHub'

      - name: Upload wwwroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: wwwroot
          path: src/server/wwwroot
          retention-days: 1

  # ── 2. C# unit tests ─────────────────────────────────────────────────────
  test-unit:
    name: C# Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run unit tests
        run: dotnet test src/tests/TagGame.Tests.Unit/TagGame.Tests.Unit.csproj --logger "console;verbosity=normal" --configuration Release

  # ── 3. C# integration tests ───────────────────────────────────────────────
  test-integration:
    name: C# Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run integration tests
        run: dotnet test src/tests/TagGame.Tests.Integration/TagGame.Tests.Integration.csproj --logger "console;verbosity=normal" --configuration Release

  # ── 4. Publish .NET + Deploy (push to main only) ─────────────────────────
  deploy:
    name: Publish & Deploy
    runs-on: ubuntu-latest
    needs: [build-client, test-unit, test-integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download wwwroot from client build
        uses: actions/download-artifact@v4
        with:
          name: wwwroot
          path: src/server/wwwroot

      - name: Publish .NET server
        run: |
          dotnet publish src/server/PoTagGame.csproj \
            -c Release \
            -o publish

      - name: Azure login (OIDC — no secrets stored)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Client to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token:                      ${{ secrets.GITHUB_TOKEN }}
          action:                          upload
          app_location:                    ${{ env.SWA_APP_LOCATION }}
          skip_app_build:                  true
          output_location:                 ''

      - name: Deploy Server to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_APP_NAME }}
          package:  publish

      - name: Verify /health endpoint
        run: |
          echo "Waiting for deployment to warm up..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://${{ env.AZURE_APP_NAME }}.azurewebsites.net/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS — app may still be warming up"
          fi

  # ── 5. Playwright E2E (on push to main after deploy) ─────────────────────
  test-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/tests/TagGame.Tests.E2E/package-lock.json

      - name: Install Playwright
        working-directory: src/tests/TagGame.Tests.E2E
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: src/tests/TagGame.Tests.E2E
        env:
          BASE_URL: 'https://victorious-island-089ca500f.4.azurestaticapps.net'
        run: npm test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/tests/TagGame.Tests.E2E/playwright-report
          retention-days: 7
