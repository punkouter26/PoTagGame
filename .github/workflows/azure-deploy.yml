name: Build and Deploy to Azure SWA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.x'
  NODE_VERSION:   '20'

jobs:
  # ── 1. Build React client ─────────────────────────────────────────────────
  build-client:
    name: Build React Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Vite SPA  (outputs to src/server/wwwroot)
        run: npm run build

      - name: Upload wwwroot artifact
        uses: actions/upload-artifact@v4
        with:
          name: wwwroot
          path: src/server/wwwroot

  # ── 2. C# unit tests ─────────────────────────────────────────────────────
  test-unit:
    name: C# Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run unit tests
        run: dotnet test src/tests/TagGame.Tests.Unit/TagGame.Tests.Unit.csproj --logger "console;verbosity=normal"

  # ── 3. C# integration tests ───────────────────────────────────────────────
  test-integration:
    name: C# Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run integration tests
        run: dotnet test src/tests/TagGame.Tests.Integration/TagGame.Tests.Integration.csproj --logger "console;verbosity=normal"

  # ── 4. Publish .NET + Deploy to Azure SWA ───────────────────────────────
  deploy:
    name: Publish & Deploy
    runs-on: ubuntu-latest
    needs: [build-client, test-unit, test-integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download wwwroot from client build
        uses: actions/download-artifact@v4
        with:
          name: wwwroot
          path: src/server/wwwroot

      - name: Publish .NET server
        run: |
          dotnet publish src/server/TagGame.csproj \
            -c Release \
            -o publish

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token:                      ${{ secrets.GITHUB_TOKEN }}
          action:                          upload
          app_location:                    publish
          skip_app_build:                  true
          output_location:                 ''

  # ── 5. Playwright E2E (against deployed staging URL on PRs) ─────────────
  test-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/tests/TagGame.Tests.E2E/package-lock.json

      - name: Install Playwright
        working-directory: src/tests/TagGame.Tests.E2E
        run: npm ci && npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: src/tests/TagGame.Tests.E2E
        env:
          BASE_URL: ${{ secrets.STAGING_URL }}
        run: npm test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src/tests/TagGame.Tests.E2E/playwright-report
